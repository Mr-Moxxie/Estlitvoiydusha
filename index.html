<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artful Style</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    /* Темный градиент */
    background:
        radial-gradient(circle at top, rgba(180,0,0,.25), transparent 40%),
        radial-gradient(circle at bottom, rgba(80,0,0,.35), transparent 55%),
        linear-gradient(180deg,#080808,#120000,#050505);

    font-family:Arial,sans-serif;
}

/* Красное свечение */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        repeating-linear-gradient(
            90deg,
            transparent 0px,
            transparent 120px,
            rgba(255,0,0,.02) 121px,
            transparent 122px
        );
    animation:move 8s linear infinite;
}

@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(120px);}
}

/* Легкая виньетка */
body::after{
    content:"";
    position:fixed;
    inset:0;
    box-shadow: inset 0 0 250px black;
}
</style>

</head>
<body>

</body>
</html>
